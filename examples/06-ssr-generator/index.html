<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Isomorphic SSR with Manifest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>window.__HYDRATION_DATA__ = {"root.profile":{"className":"UserProfile","data":{"name":"Alice Freeman","role":"Software Engineer"},"slots":{}}};</script>

    <script type="importmap">
        {
            "imports": {
                "@supercat1337/ui": "../../dist/ui.bundle.esm.js"
            }
        }
    </script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div id="client-app-root">
        <div class="card shadow-sm" style="width: 18rem;" data-component-root="pacs-1" data-sid="root.profile">
            <div class="card-body text-center">
                <h5 class="card-title" data-ref="userName">Alice Freeman</h5>
                <p class="text-muted" data-ref="userRole">Software Engineer</p>
                <button class="btn btn-outline-primary w-100" data-ref="followBtn">Follow</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { UserProfile } from './UserProfile.js';
        import { Config } from '@supercat1337/ui';

        // CLIENT-SIDE HYDRATION
        // Create instance with SID to link it with manifest data
        const profile = new UserProfile({ sid: 'root.profile' });
        
        // Hydration process: 
        // 1. applyHydration() -> 2. restoreCallback(data) -> 3. scanRefs() -> 4. connectedCallback()
        profile.mount(document.getElementById('client-app-root'), 'hydrate');

        // Cleanup: remove global manifest to free memory
        Config.destroyManifest();
    </script>
</body>
</html>
