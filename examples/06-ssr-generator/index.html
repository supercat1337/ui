<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Isomorphic SSR Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "@supercat1337/ui": "../../dist/ui.bundle.esm.js"
            }
        }
    </script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div id="client-app-root">
        <div data-component-root="user-101" class="card shadow-sm" style="width: 18rem;">
            <div class="card-body text-center">
                <h5 class="card-title" data-ref="userName">Alice Freeman</h5>
                <p class="text-muted" data-ref="userRole">Software Engineer</p>
                <button class="btn btn-outline-primary w-100" data-ref="followBtn">Follow</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { UserProfile } from './UserProfile.js';

        // CLIENT-SIDE HYDRATION
        // We use the exact same data to ensure the VDOM matches the SSR HTML
        const profile = new UserProfile({"id":101,"name":"Alice Freeman","role":"Software Engineer"});
        
        // Connect event listeners to existing [data-component-root]
        profile.mount(document.getElementById('client-app-root'), 'hydrate');
    </script>
</body>
</html>
