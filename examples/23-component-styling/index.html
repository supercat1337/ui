<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Example: Component Styling in BareDOM</title>
        <!-- Bootstrap 5 (global styles) -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <!-- Custom global styles (CSS classes) -->
        <link rel="stylesheet" href="./style.css" />
        <script type="importmap">
            {
                "imports": {
                    "@supercat1337/ui": "../../dist/ui.bundle.esm.js"
                }
            }
        </script>
        <style>
            /* Minimal global adjustments for centering */
            html,
            body {
                height: 100%;
                margin: 0;
                background: #f0f2f5;
            }
        </style>
    </head>
    <body class="d-flex justify-content-center align-items-center p-3">
        <div id="app"></div>
        <script type="module" src="./main.js" async></script>
    </body>
</html>
