<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Example 14: SSR Hydration</title>
        <link rel="stylesheet" href="style.css" />
        <script type="importmap">
            {
                "imports": {
                    "@supercat1337/ui": "../../dist/ui.bundle.esm.js"
                }
            }
        </script>
    </head>
    <body>
<div id="app">
        <div data-component-root="prod-101" class="product-card">
            <h3>Smartphone Pro</h3>
            <p>High-end performance for professionals.</p>
            <button data-ref="buyBtn">Add to Cart (SSR)</button>
        </div>

        <div class="notify-content">
            <p>Item successfully added to your cart!</p>
            <button data-ref="closeBtn">Continue Shopping</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
