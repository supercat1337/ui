<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ESM Async Component Loader</title>
        <style>
            /* Basic styling for our example */
            body {
                font-family: sans-serif;
                padding: 20px;
                line-height: 1.6;
            }
            .stage {
                margin-top: 20px;
                padding: 15px;
                border: 1px dashed #ccc;
                min-height: 100px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .loader {
                color: #666;
                font-style: italic;
            }
            .profile-card {
                border: 1px solid #ddd;
                padding: 15px;
                border-radius: 8px;
                display: flex;
                gap: 15px;
                align-items: center;
            }
            .profile-card img {
                border-radius: 50%;
                width: 60px;
                height: 60px;
            }
            button {
                padding: 8px 16px;
                cursor: pointer;
            }
            button:disabled {
                cursor: not-allowed;
                opacity: 0.6;
            }
            .d-none {
                display: none !important;
            }
        </style>
        <script type="importmap">
            {
                "imports": {
                    "@supercat1337/ui": "../../dist/ui.bundle.esm.js"
                }
            }
        </script>
    </head>
    <body>
        <div id="app"></div>

        <script type="module">
            import { App } from './App.js';

            // Initialize the root component
            const app = new App();
            app.mount(document.getElementById('app'));
        </script>
    </body>
</html>
